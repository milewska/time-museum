<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Time Museum — Fire Time</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#f5d5a8; font-family: Georgia, serif; overflow:hidden; touch-action: none; }
    canvas { position:fixed; inset:0; }
    .overlay { position:fixed; inset:0; background:rgba(11,11,25,0.92); display:flex; align-items:center; justify-content:center; z-index:100; }
    .intro-content, .coming-content { text-align:center; max-width:420px; }
    h1 { font-size:3.2rem; letter-spacing:4px; margin-bottom:8px; }
    .tagline { font-size:1.3rem; margin-bottom:32px; opacity:0.9; }
    button { background:#222; color:#f5d5a8; border:2px solid #d4a017; padding:14px 32px; font-size:1.1rem; cursor:pointer; transition:all 0.2s; }
    button:hover { background:#d4a017; color:#111; }
    .top-bar { position:absolute; top:20px; left:20px; right:20px; text-align:center; pointer-events:none; }
    #room-title { font-size:1.8rem; letter-spacing:3px; }
    #room-subtitle { font-size:1rem; opacity:0.7; margin-top:4px; }
    .ui-btn { position:absolute; bottom:20px; right:20px; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; background:#222; border:2px solid #d4a017; }
    .info-panel { position:absolute; bottom:20px; left:20px; right:20px; max-width:520px; margin:0 auto; background:rgba(20,20,35,0.95); border:2px solid #d4a017; padding:24px; border-radius:8px; box-shadow:0 0 40px rgba(212,160,23,0.3); }
    .panel-content { position:relative; }
    .close-btn { position:absolute; top:-12px; right:-12px; width:32px; height:32px; border-radius:50%; background:#111; border:2px solid #d4a017; font-size:1.4rem; line-height:28px; cursor:pointer; }
    #panel-title { font-size:1.6rem; margin-bottom:12px; color:#f5d5a8; }
    #panel-desc { line-height:1.6; font-size:1.05rem; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Intro -->
  <div id="intro" class="overlay">
    <div class="intro-content">
      <h1>The Time Museum</h1>
      <p class="tagline">Everything is a clock.</p>
      <button id="enter-btn">Enter Exhibit 1 — Fire Time</button>
    </div>
  </div>

  <!-- Room UI -->
  <div id="room-ui" class="overlay hidden" style="background:transparent; pointer-events:none;">
    <div class="top-bar">
      <div id="room-title">Fire Time</div>
      <div id="room-subtitle">Fire as Clock</div>
    </div>
    <button id="mute-btn" class="ui-btn">🔊</button>
    
    <!-- Info Panel -->
    <div id="info-panel" class="info-panel hidden" style="pointer-events:auto;">
      <div class="panel-content">
        <button id="close-panel" class="close-btn">✕</button>
        <h2 id="panel-title"></h2>
        <div id="panel-desc"></div>
      </div>
    </div>
  </div>

  <!-- Coming Soon -->
  <div id="coming-soon" class="overlay hidden">
    <div class="coming-content">
      <h2>Next Exhibit: Water Time</h2>
      <p>Coming soon…</p>
      <button id="back-to-room">Return to Fire Time</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const currentExhibit = {
      title: "Fire Time",
      subtitle: "Fire as Clock",
      roomImage: "https://picsum.photos/id/1015/4096/2048",
      artifacts: [
        { id: "candle-clock", title: "Candle Clock", position: {x:-2.2,y:0.6,z:-4.8}, desc: "Marked candles measured duration as the candle burned downward. Each line represented a rough interval.", hist: "Used across ancient China and medieval Europe. One candle could mark a full night’s watch." },
        { id: "oil-lamp", title: "Oil Lamp", position: {x:-0.8,y:-0.4,z:-4.9}, desc: "Oil lamps measured time by the rate at which fuel was consumed. The disappearing oil became a visible measure of duration.", hist: "The level dropped steadily — duration made visible." },
        { id: "incense-clock", title: "Incense Clock", position: {x:1.1,y:0.8,z:-4.7}, desc: "Incense clocks used the slow burning of incense to mark time through scent, smoke, and ash.", hist: "Time you could smell and watch vanish." },
        { id: "fuse-rope", title: "Fuse Rope", position: {x:2.3,y:-0.7,z:-4.6}, desc: "Knotted ropes or slow-burning cords marked shorter intervals. Each knot became a unit of time.", hist: "An ember traveled from knot to knot." },
        { id: "fire-beacons", title: "Fire Beacons", position: {x:0,y:1.4,z:-5}, desc: "Fire could also tell communal time across distance. Beacons signaled moments, warnings, beginnings, and endings.", hist: "A chain of flames across the mountains." }
      ],
      door: { label: "Next Exhibit: Water Time", position: {x:4.2,y:0.2,z:-3.5} }
    };

    let scene, camera, renderer, sphereMesh;
    let raycaster, pointer;
    let hotspots = [];
    let yaw = Math.PI * -0.2, pitch = 0.1, fov = 75;
    let isDragging = false;
    let previousMouse = {x:0, y:0};
    let audio, audioMuted = false;

    const canvas = document.getElementById('canvas');

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));

      const geo = new THREE.SphereGeometry(50, 64, 40);
      geo.scale(-1, 1, 1);
      const loader = new THREE.TextureLoader();
      loader.load(currentExhibit.roomImage, tex => {
        sphereMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide }));
        scene.add(sphereMesh);
      });

      camera.position.set(0,0,0);
      raycaster = new THREE.Raycaster();
      pointer = new THREE.Vector2();

      createHotspots();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      canvas.addEventListener('pointerdown', onDown);
      canvas.addEventListener('pointermove', onMove);
      canvas.addEventListener('pointerup', onUp);
      canvas.addEventListener('wheel', e => {
        fov = Math.max(35, Math.min(95, fov + e.deltaY * 0.05));
        camera.fov = fov;
        camera.updateProjectionMatrix();
      });

      let initialDist = 0;
      canvas.addEventListener('touchstart', e => { if (e.touches.length === 2) initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); });
      canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
          const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          fov = Math.max(35, Math.min(95, fov + (initialDist - dist) * 0.08));
          camera.fov = fov;
          camera.updateProjectionMatrix();
          initialDist = dist;
        }
      });

      document.getElementById('enter-btn').onclick = () => {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('room-ui').classList.remove('hidden');
        audio = new Audio('https://freesound.org/data/previews/202/202191_3764196-lq.mp3');
        audio.loop = true; audio.volume = 0.35; audio.play().catch(()=>{});
      };
      document.getElementById('mute-btn').onclick = () => { if (audio) { audioMuted = !audioMuted; audio.muted = audioMuted; } };
      document.getElementById('close-panel').onclick = () => document.getElementById('info-panel').classList.add('hidden');
      document.getElementById('back-to-room').onclick = () => document.getElementById('coming-soon').classList.add('hidden');

      animate();
    }

    function createHotspots() {
      hotspots.forEach(h => scene.remove(h.mesh));
      hotspots = [];
      const mat = new THREE.MeshBasicMaterial({ color: 0xd4a017, transparent: true, opacity: 0.35, side: THREE.DoubleSide });

      currentExhibit.artifacts.forEach(art => {
        const pos = new THREE.Vector3(art.position.x, art.position.y, art.position.z);
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), mat);
        mesh.position.copy(pos);
        mesh.userData = { type: 'artifact', data: art };
        scene.add(mesh);
        hotspots.push({mesh});
      });

      const dpos = new THREE.Vector3(currentExhibit.door.position.x, currentExhibit.door.position.y, currentExhibit.door.position.z);
      const doorMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 2.2), mat);
      doorMesh.position.copy(dpos);
      doorMesh.lookAt(0,0,0);
      doorMesh.userData = { type: 'door' };
      scene.add(doorMesh);
      hotspots.push({mesh: doorMesh});
    }

    function onDown(e) { isDragging = true; previousMouse = {x: e.clientX, y: e.clientY}; }
    function onMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - previousMouse.x;
      const dy = e.clientY - previousMouse.y;
      yaw -= dx * 0.003;
      pitch = Math.max(-1.4, Math.min(1.4, pitch - dy * 0.003));
      camera.rotation.set(pitch, yaw, 0);
      previousMouse = {x: e.clientX, y: e.clientY};
    }
    function onUp(e) {
      isDragging = false;
      pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(hotspots.map(h => h.mesh));
      if (hits.length > 0) {
        const obj = hits[0].object.userData;
        if (obj.type === 'artifact') {
          document.getElementById('panel-title').textContent = obj.data.title;
          document.getElementById('panel-desc').innerHTML = `<p>${obj.data.desc}</p><p style="margin-top:16px;font-style:italic;opacity:0.8;">${obj.data.hist}</p>`;
          document.getElementById('info-panel').classList.remove('hidden');
        } else if (obj.type === 'door') {
          document.getElementById('coming-soon').classList.remove('hidden');
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
